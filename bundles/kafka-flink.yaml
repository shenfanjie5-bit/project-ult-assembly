bundle_name: kafka-flink
services:
  - name: kafka
    image_or_cmd: bitnami/kafka:3.7.1
    image: bitnami/kafka:3.7.1
    health_probe: kafka-topics.sh --bootstrap-server 127.0.0.1:${KAFKA_PORT:-9092} --list
    env:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_PORT:-9092}
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
  - name: flink-jobmanager
    image_or_cmd: flink:1.19
    image: flink:1.19
    command: jobmanager
    health_probe: curl -f http://127.0.0.1:${FLINK_JOBMANAGER_PORT:-8081}/overview
    env:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_JOBMANAGER_PORT: ${FLINK_JOBMANAGER_PORT:-8081}
  - name: flink-taskmanager
    image_or_cmd: flink:1.19
    image: flink:1.19
    command: taskmanager
    health_probe: curl -f http://flink-jobmanager:${FLINK_JOBMANAGER_PORT:-8081}/taskmanagers
    env:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_JOBMANAGER_PORT: ${FLINK_JOBMANAGER_PORT:-8081}
startup_order:
  - kafka
  - flink-jobmanager
  - flink-taskmanager
shutdown_order:
  - flink-taskmanager
  - flink-jobmanager
  - kafka
health_checks:
  - kafka-topics.sh --bootstrap-server 127.0.0.1:${KAFKA_PORT:-9092} --list
  - curl -f http://127.0.0.1:${FLINK_JOBMANAGER_PORT:-8081}/overview
  - curl -f http://flink-jobmanager:${FLINK_JOBMANAGER_PORT:-8081}/taskmanagers
required_profiles:
  - full-dev
optional: true
