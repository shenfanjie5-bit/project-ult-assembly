# Dagster instance config — Postgres-backed unified storage matching the
# DAGSTER_POSTGRES_* env vars set in bundles/dagster.yaml +
# compose/lite-local.yaml + compose/full-dev.yaml.
#
# Hostname is the compose service name ``postgres`` (Docker's internal
# DNS resolves it within the bridge network). Values are sourced from
# environment variables so the same image works against any compose
# Postgres bundle.
#
# Uses the unified ``storage:`` block (Dagster 1.7+); the legacy
# per-component ``run_storage`` / ``event_log_storage`` /
# ``schedule_storage`` keys are mutually exclusive with ``storage:`` and
# would raise ``DagsterInvalidConfigError`` if both were present.

storage:
  postgres:
    postgres_db:
      hostname:
        env: DAGSTER_POSTGRES_HOST
      port:
        env: DAGSTER_POSTGRES_PORT
      username:
        env: DAGSTER_POSTGRES_USER
      password:
        env: DAGSTER_POSTGRES_PASSWORD
      db_name:
        env: DAGSTER_POSTGRES_DB
